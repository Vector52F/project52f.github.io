<style>
:root{--ink:#0e1520;--ink-mid:#111c2d;--ink-card:#142030;--ink-light:#1a2940;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.3);--gold-ghost:rgba(201,168,76,0.1);--teal:#0e9b8e;--teal-light:#15c4b4;--body-text:#b8c4d0;--muted:#6e8299;--border:rgba(201,168,76,0.18);--border-dim:rgba(201,168,76,0.08);--green:#3ddc84;--red:#ff5a5f;--mono:'DM Mono',monospace;--serif:'Cormorant Garamond',serif}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--ink);color:var(--body-text);font-family:var(--serif);min-height:100vh}body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
header{position:sticky;top:0;z-index:100;background:rgba(14,21,32,0.95);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:baseline;gap:12px}.logo-mark{font-family:var(--mono);font-size:1.2rem;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;font-weight:500}.logo-sub{font-size:0.75rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;font-style:italic}
.header-right{display:flex;align-items:center;gap:20px}.live-indicator{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s ease-in-out infinite}.live-dot.mock{background:var(--gold);animation:none}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.mode-toggle{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;background:var(--ink-card)}.mode-btn{padding:6px 14px;font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;background:transparent;border:none;color:var(--muted);cursor:pointer}.mode-btn.active{background:var(--gold);color:var(--ink);font-weight:500}
.tab-bar{position:relative;z-index:99;display:flex;align-items:center;border-bottom:1px solid var(--border);background:rgba(17,28,45,0.95);padding:0 24px}.tab-btn{padding:16px 24px;font-family:var(--serif);font-size:0.85rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;margin-bottom:-1px;font-style:italic}.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}.tab-hint{margin-left:auto;font-family:var(--mono);font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;font-style:italic}
main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px}.tab-panel{display:none}.tab-panel.active{display:block;animation:fadeIn 0.4s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--ink-card);border:1px solid var(--border);border-radius:8px;padding:24px;position:relative;overflow:hidden;margin-bottom:16px}.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.4}.card-title{font-family:var(--mono);font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--teal-light);margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
